<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NetWatch — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050c1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0,150,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 30%, rgba(0,80,200,0.08) 0%, transparent 70%);
    }
    .particles {
      position: fixed; inset: 0; pointer-events: none;
      background-image: radial-gradient(rgba(0,200,255,0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: drift 20s linear infinite;
      opacity: 0.4;
    }
    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-40px); } }

    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 44px;
      width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #00d4ff, #0066ff);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 4px 20px rgba(0,150,255,0.4);
    }
    .logo-text { font-size: 26px; font-weight: 700; color: #e8edf5; letter-spacing: -0.5px; }
    .logo-text span { color: #00d4ff; }
    .subtitle { color: #5a6a82; font-size: 13px; margin-bottom: 36px; margin-left: 56px; }

    label { display: block; color: #8892a4; font-size: 12px; font-weight: 500;
            letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
    .input-wrap { position: relative; margin-bottom: 24px; }
    input[type=password] {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: #e8edf5;
      font-size: 15px; font-family: inherit;
      transition: all 0.2s; outline: none;
    }
    input[type=password]:focus {
      border-color: rgba(0,212,255,0.5);
      background: rgba(0,212,255,0.06);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #5a6a82; font-size: 18px;
    }
    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #0099cc, #0055ff);
      border: none; border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,100,255,0.35);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,100,255,0.45); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      margin-top: 16px; padding: 12px 16px;
      background: rgba(255,59,92,0.12); border: 1px solid rgba(255,59,92,0.3);
      border-radius: 10px; color: #ff6b8a; font-size: 13px; text-align: center;
      display: none;
    }
    .error-msg.show { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .footer-note {
      margin-top: 28px; text-align: center;
      color: #3a4a5e; font-size: 12px;
    }
    .footer-note strong { color: #4a5a72; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="particles"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">Net<span>Watch</span></div>
    </div>
    <p class="subtitle">Monitor de Red VTSA — Acceso restringido</p>

    <form id="loginForm">
      <label for="pw">Contraseña de acceso</label>
      <div class="input-wrap">
        <input type="password" id="pw" placeholder="••••••••••••" autocomplete="current-password" autofocus/>
        <button type="button" class="toggle-pw" onclick="togglePw()" title="Mostrar/ocultar">👁</button>
      </div>
      <button class="btn-login" type="submit" id="btnLogin">Ingresar al Dashboard →</button>
      <div class="error-msg" id="errMsg">Contraseña incorrecta. Intentá de nuevo.</div>
    </form>

    <p class="footer-note">🔒 Solo acceso local &nbsp;·&nbsp; <strong>localhost:8080</strong></p>
  </div>

  <script>
    function togglePw() {
      const i = document.getElementById('pw');
      i.type = i.type === 'password' ? 'text' : 'password';
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errMsg');
      const pw  = document.getElementById('pw').value;
      btn.disabled = true; btn.textContent = 'Verificando...';
      err.classList.remove('show');
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({password: pw})
        });
        const d = await r.json();
        if (d.success) { window.location.href = '/index.html'; }
        else { err.classList.add('show'); btn.disabled = false; btn.textContent = 'Ingresar al Dashboard →'; }
      } catch(ex) {
        err.textContent = 'Error de conexión con el servidor.';
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Ingresar al Dashboard →';
      }
    });
    // Si ya esta autenticado, redirigir
    fetch('/api/status').then(r => { if (r.ok) window.location.href='/index.html'; }).catch(()=>{});
  </script>
</body>
</html>
